# Iteration 19 grounded-quantity repair: unchanged ft_v8 recipe plus the
# 18-example agent_v10_micro round. Literal schedule and all LoRA
# hyperparameters remain unchanged; generation must set
# {"enable_thinking": false}.
# seed 29 chosen: seed-29 alone fixed the refusal-length protect (agen-v1-000135,
# 129->101 words); ft_v10 adds sleep-field coverage + crisp refusals to also fix
# ev1x-core2-000002 and advs-v1-000002. Stacks the proven seed with the data fix.
model: "Qwen/Qwen3-1.7B"
train: true
data: "data/ft_v10_qwen3_1.7b"
seed: 29

fine_tune_type: lora
num_layers: 16
lora_parameters:
  rank: 16
  scale: 20.0
  dropout: 0.05

batch_size: 1
iters: 2116
learning_rate: 1.0e-5
max_seq_length: 3072

steps_per_report: 25
steps_per_eval: 125
save_every: 250
adapter_path: "models/adapters/ft_v10_qwen3-1.7b"
