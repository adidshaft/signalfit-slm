# Iteration 16 micro-repair: unchanged ft_v7_micro recipe plus the 30-example
# agent_v8_micro round. Literal schedule and all LoRA hyperparameters remain
# unchanged; generation must set {"enable_thinking": false}.
model: "Qwen/Qwen3-1.7B"
train: true
data: "data/ft_v8_qwen3_1.7b"
seed: 17

fine_tune_type: lora
num_layers: 16
lora_parameters:
  rank: 16
  scale: 20.0
  dropout: 0.05

batch_size: 1
iters: 2116
learning_rate: 1.0e-5
max_seq_length: 3072

steps_per_report: 25
steps_per_eval: 125
save_every: 250
adapter_path: "models/adapters/ft_v8_qwen3-1.7b"
