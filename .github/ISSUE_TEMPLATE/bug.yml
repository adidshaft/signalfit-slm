name: Bug report
description: Report a reproducible problem in repository tooling, schemas, or tests.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include real health data, credentials, or model weights.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include the exact command and a minimal synthetic input.
      render: shell
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: main or a commit SHA
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove private paths, tokens, and personal data.
      render: text
